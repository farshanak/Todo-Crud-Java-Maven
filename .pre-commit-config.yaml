repos:
  # =========================================================================
  # LAYER 1: FILE HYGIENE (Fast checks)
  # =========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict

  # =========================================================================
  # LAYER 2: SECURITY (Prevent credential leaks)
  # =========================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: \.env\.example$

  # =========================================================================
  # LAYER 3: BRANCH NAMING (Convention enforcement)
  # =========================================================================
  - repo: local
    hooks:
      - id: branch-name-check
        name: Check branch naming convention
        entry: bash scripts/check-branch-name.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 4: COMPILATION (Fail fast on broken code)
  # =========================================================================
  - repo: local
    hooks:
      - id: maven-compile
        name: Maven Compile Check
        entry: bash -c './mvnw compile -B -q'
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 5: UNIT TESTS (TIA - only affected tests)
  # =========================================================================
  - repo: local
    hooks:
      - id: maven-test
        name: Maven Unit Tests (TIA)
        entry: bash -c './mvnw test -B -Dtest="com.example.todo.unit.*" -Dsurefire.failIfNoSpecifiedTests=false'
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 6: SRP SIZE GUARDRAILS
  # =========================================================================
  - repo: local
    hooks:
      - id: srp-size-check
        name: SRP Size Guardrails
        entry: bash scripts/check-srp-size.sh
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 7: IRON DOME — Silent Catch Ratchet
  # =========================================================================
  - repo: local
    hooks:
      - id: silent-catch-ratchet
        name: Silent Catch Ratchet (Iron Dome)
        entry: bash scripts/governance/check-silent-catches.sh
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 8: RISING TIDE — Mock Tax (2x Rule)
  # =========================================================================
  - repo: local
    hooks:
      - id: mock-tax
        name: Mock Tax Enforcer (Rising Tide)
        entry: bash scripts/governance/check-mock-tax.sh
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 9: SRP GUARDRAILS — File/Method Size
  # =========================================================================
  - repo: local
    hooks:
      - id: guardrails
        name: SRP Guardrails (File Size)
        entry: bash scripts/governance/guardrails-check.sh
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 10: TEST DISCIPLINE — Skipped Tests
  # =========================================================================
  - repo: local
    hooks:
      - id: skipped-tests
        name: Skipped Test Discipline
        entry: bash scripts/governance/check-skipped-tests.sh
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]

  # =========================================================================
  # LAYER 11: BUDDY SYSTEM — Integration Test Pairing
  # =========================================================================
  - repo: local
    hooks:
      - id: integration-pairing
        name: Integration Test Pairing (Buddy System)
        entry: bash scripts/governance/verify-integration-pairing.sh
        language: system
        files: \.java$
        pass_filenames: false
        stages: [pre-commit]
