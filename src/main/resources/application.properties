spring.application.name=todo-crud

# H2 in-memory database (overridable via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:tododb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Server
server.port=${SERVER_PORT:8080}

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}

# Logging
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.example.todo=${LOGGING_LEVEL_COM_EXAMPLE_TODO:DEBUG}
